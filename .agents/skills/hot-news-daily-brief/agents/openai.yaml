interface:
  display_name: "Hot News Daily Brief"
  short_description: "Run two-stage hot-news pipeline for offline-safe daily digests"
  default_prompt: "Use local inbox news candidate files to generate a bilingual daily digest in this order: Top 5, 当日总体总结（约300字）, [时政], [金融], [科技-AI], [科技-其他], optional [X 热点] when X candidates exist, and finally 数据源抓取与有效性（过去24小时）. Each section should output Top3 stories whenever enough reliable candidates exist. Top 5 must use section champions (Top1 from each of the four core sections) plus one wildcard next-best item. For every story include Why hot, English summary, 中文翻译, English word count, source URLs (for X stories include shared-link URLs when relevant), and absolute published time. English summary must be long-form, at least 200 English words, and include quantitative evidence (numbers, percentages, time windows, money levels, or counts) with clear source grounding. 中文翻译 must be paragraph-by-paragraph literal translation of the English summary and should not add new claims. Do not output 评论 unless explicitly requested. Source-health section must list successful and failed sources from fetch_report."
