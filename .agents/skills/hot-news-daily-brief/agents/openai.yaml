interface:
  display_name: "Hot News Daily Brief"
  short_description: "Run two-stage hot-news pipeline for offline-safe daily digests"
  default_prompt: "Use local inbox news candidate files to generate a bilingual daily digest in this order: Top 5, 当日总体总结（约300字）, 数据源抓取与有效性（过去24小时）, [时政], [金融], [科技-AI], [科技-其他]. Each section should output Top3 stories whenever enough reliable candidates exist. Top 5 must use section champions (Top1 from each section) plus one wildcard next-best item. For every story include Why hot, English summary, 中文总结, English word count, source URLs, and absolute published time. English summary must be long-form and at least 200 English words per story. Source-health section must list successful and failed sources from fetch_report."
